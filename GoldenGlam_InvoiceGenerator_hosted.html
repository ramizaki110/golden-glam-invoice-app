<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Glam Invoice Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #111;
  color: #fff;
  padding: 20px;
}

.sidebar .brand {
  font-weight: bold;
  font-size: 18px;
}

.sidebar .sub {
  font-size: 12px;
  margin-bottom: 20px;
}

.nav-btn {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  background: #222;
  color: #fff;
  cursor: pointer;
}

.nav-btn.active {
  background: #444;
}

.content {
  padding: 20px;
  flex: 1;
}

textarea {
  width: 100%;
  height: 200px;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="brand">Golden Glam</div>
  <div class="sub">Invoice Generator</div>

  <button class="nav-btn active" onclick="showTab('export',this)">📄 Summary & Export</button>

  <div style="margin-top:20px;font-size:12px;">
    Open in any browser • No login needed
  </div>
</nav>

<!-- Main -->
<div class="content">

<h2>Summary & Export</h2>

<p>Paste your invoice summary below, then generate files.</p>

<textarea id="summary"></textarea>

<br>
<button onclick="generate()">Generate PDF & Excel</button>

<div id="result"></div>

</div>

<script>

function showTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/*
 ✅ IMAGE PROCESSING FIX
 - Keeps transparency (no black background)
 - Uses PNG instead of JPEG
 - DOES NOT force white background
*/
function processImage(img) {
  const max = 500;
  const scale = Math.min(max / img.width, max / img.height, 1);

  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);

  const cv = document.createElement('canvas');
  cv.width = w;
  cv.height = h;

  const ctx = cv.getContext('2d');

  // IMPORTANT: clear instead of filling (preserves transparency)
  ctx.clearRect(0, 0, w, h);

  ctx.drawImage(img, 0, 0, w, h);

  return cv.toDataURL('image/png');
}

// Generate
async function generate() {
  const summary = document.getElementById("summary").value;

  const resDiv = document.getElementById("result");
  resDiv.innerHTML = "Generating...";

  try {
    const res = await fetch("/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({summary})
    });

    const data = await res.json();

    if (!data.ok) {
      resDiv.innerHTML = "❌ Error: " + data.error;
      return;
    }

    resDiv.innerHTML = `
      ✅ Done! <br><br>
      <a href="${data.pdf_url}" target="_blank">Download PDF</a><br>
      <a href="${data.xlsx_url}" target="_blank">Download Excel</a>
    `;

  } catch (e) {
    resDiv.innerHTML = "❌ Failed to generate";
  }
}

</script>

</body>
</html>
